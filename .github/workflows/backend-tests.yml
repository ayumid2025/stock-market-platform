name: Backend Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest
    - name: Run tests
      env:
        SECRET_KEY: test
        JWT_SECRET_KEY: test
        DATABASE_URL: sqlite:///test.db
        ALPHA_VANTAGE_KEY: demo
      run: |
        cd backend
        pytest
