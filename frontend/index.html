<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Platform - Login/Register</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <ul class="nav nav-tabs card-header-tabs">
                            <li class="nav-item">
                                <a class="nav-link active" id="login-tab" href="#">Login</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" id="register-tab" href="#">Register</a>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body">
                        <div id="login-form">
                            <h5 class="card-title">Login</h5>
                            <input type="text" id="login-username" class="form-control mb-2" placeholder="Username">
                            <input type="password" id="login-password" class="form-control mb-2" placeholder="Password">
                            <button class="btn btn-primary" onclick="login()">Login</button>
                            <div id="login-message" class="mt-2"></div>
                        </div>
                        <div id="register-form" style="display: none;">
                            <h5 class="card-title">Register</h5>
                            <input type="text" id="reg-username" class="form-control mb-2" placeholder="Username">
                            <input type="email" id="reg-email" class="form-control mb-2" placeholder="Email">
                            <input type="password" id="reg-password" class="form-control mb-2" placeholder="Password">
                            <button class="btn btn-success" onclick="register()">Register</button>
                            <div id="register-message" class="mt-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
