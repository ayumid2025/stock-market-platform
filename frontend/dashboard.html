<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Stock Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">📈 Stock Platform</span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <!-- Left column: Stock lookup and trading -->
            <div class="col-md-8">
                <!-- Stock Lookup -->
                <div class="card mb-3">
                    <div class="card-header">🔍 Stock Lookup</div>
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" id="symbol" class="form-control" placeholder="Enter symbol (e.g., AAPL)">
                            <button class="btn btn-primary" onclick="lookupStock()">Get Quote</button>
                        </div>
                        <div id="quote-result" class="mt-3"></div>
                    </div>
                </div>
                <!-- Trading Form -->
                <div class="card mb-3">
                    <div class="card-header">💰 Trade</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col">
                                <input type="text" id="trade-symbol" class="form-control mb-2" placeholder="Symbol">
                            </div>
                            <div class="col">
                                <input type="number" id="trade-quantity" class="form-control mb-2" placeholder="Quantity">
                            </div>
                        </div>
                        <button class="btn btn-success" onclick="placeOrder('buy')">Buy</button>
                        <button class="btn btn-danger" onclick="placeOrder('sell')">Sell</button>
                        <div id="trade-message" class="mt-2"></div>
                    </div>
                </div>
                <!-- Chart -->
                <div class="card mb-3">
                    <div class="card-header">📊 Price Chart</div>
                    <div class="card-body">
                        <canvas id="stockChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>
            <!-- Right column: Portfolio summary -->
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-header">📋 Portfolio Summary</div>
                    <div class="card-body">
                        <p>Cash: $<span id="cash-balance">0.00</span></p>
                        <p>Total Value: $<span id="total-value">0.00</span></p>
                    </div>
                </div>
                <div class="card mb-3">
                    <div class="card-header">📦 Holdings</div>
                    <div class="card-body" id="holdings-list">
                        <!-- populated by JS -->
                    </div>
                </div>
                <div class="card mb-3">
                    <div class="card-header">📜 Recent Orders</div>
                    <div class="card-body" id="orders-list">
                        <!-- populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
